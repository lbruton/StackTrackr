# Browserless — Portainer deployment on home VM (192.168.1.81)
# ────────────────────────────────────────────────────────────
# Headless Chromium WebSocket endpoint for Playwright testing.
# Joins staktrakr-net so other stacks (home-poller, firecrawl) can reach it.
#
# WebSocket: ws://192.168.1.81:3000/chromium/playwright?token=<TOKEN>
# Health:    http://192.168.1.81:3000/
#
# Deploy via Portainer: Stacks → Add stack → paste or upload this file.
# Set BROWSERLESS_TOKEN in the Portainer stack environment variables.

services:
  browserless:
    image: ghcr.io/browserless/chromium
    container_name: staktrakr-browserless
    ports:
      - "3000:3000"
    environment:
      - TOKEN=${BROWSERLESS_TOKEN:-local_dev_token}
      - CONCURRENT=5
      - QUEUED=10
      - TIMEOUT=120000
      - HEALTH=true
      - TZ=America/New_York
    restart: unless-stopped

networks:
  default:
    name: staktrakr-net
    external: true
