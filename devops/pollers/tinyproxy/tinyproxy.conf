# tinyproxy — StakTrakr home proxy
# Accepts connections only from the Tailscale mesh (Fly.io container + localhost).
# Fly.io sets PROXY_SERVER=http://100.112.198.50:8888 to route scraper traffic
# through this residential IP while Turso/GitHub traffic stays on Fly's network.

User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 120
LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Info
MaxClients 50

# Only allow connections from Tailscale addresses
# This VM (stacktrckr-home)
Allow 100.112.198.50
# Fly.io container (staktrakr-fly)
Allow 100.90.171.110
# Docker bridge (for containers on the same host)
Allow 172.16.0.0/12
# Localhost (for local testing)
Allow 127.0.0.1
Allow ::1

# Strip Via header — don't advertise we're a proxy to target sites
DisableViaHeader Yes
