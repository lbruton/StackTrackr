# StakTrakr Home Poller — Docker Compose
# ────────────────────────────────────────
# Deploy: docker --context homepoller compose -f docker-compose.home.yml up --build -d
#
# Build context is devops/pollers/ so the Dockerfile can reach both
# shared/ (common code) and home-poller/ (home-specific files).

services:
  home-poller:
    build:
      context: .
      dockerfile: home-poller/Dockerfile
    container_name: staktrakr-home-poller
    restart: unless-stopped
    environment:
      - DATA_DIR=/data
      - POLLER_ID=home
      - BROWSER_MODE=local
      - PLAYWRIGHT_LAUNCH=1
      - PLAYWRIGHT_BROWSERS_PATH=/root/.cache/ms-playwright
      - DASHBOARD_PORT=3010
      - METRICS_PORT=9100
      - NET_IFACE=eth0
      - POLLER_LOG=/data/logs/retail-poller.log
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - METAL_PRICE_API_KEY=${METAL_PRICE_API_KEY}
      - FIRECRAWL_BASE_URL=${FIRECRAWL_BASE_URL:-http://firecrawl-api:3002}
      - VISION_ENABLED=${VISION_ENABLED:-0}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FLYIO_TAILSCALE_IP=${FLYIO_TAILSCALE_IP:-100.90.171.110}
      - FLYIO_HTTP_URL=${FLYIO_HTTP_URL:-https://api2.staktrakr.com/data/retail/providers.json}
      - CF_CLEARANCE_SCRAPER_URL=${CF_CLEARANCE_SCRAPER_URL:-http://byparr:8191}
      - CF_CLEARANCE_ENABLED=${CF_CLEARANCE_ENABLED:-1}
      - CF_CLEARANCE_TIMEOUT_MS=${CF_CLEARANCE_TIMEOUT_MS:-30000}
    ports:
      - "3010:3010"   # Dashboard (HTTP)
      - "3011:3011"   # Dashboard (HTTPS for iframe embed)
      - "9100:9100"   # Prometheus metrics
    volumes:
      - poller-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: staktrakr-byparr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    volumes:
      - /dev/shm:/dev/shm
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  poller-data:
    name: staktrakr-poller-data

networks:
  default:
    name: staktrakr-net
    external: true
